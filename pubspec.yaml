name: semana_computacao
description: "Sistema de gerenciamento para a Semana da Computação do DECSI - centraliza informações, check-in, programação, agenda personalizada e envio de perguntas."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.0
  http: ^1.1.0
  intl: ^0.19.0
  table_calendar: ^3.0.0
  qr_flutter: ^4.1.0
  permission_handler: ^11.4.0
  shared_preferences: ^2.2.2
  crypto: ^3.0.2
  uuid: ^4.0.0
  flutter_secure_storage: ^9.0.0
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true

